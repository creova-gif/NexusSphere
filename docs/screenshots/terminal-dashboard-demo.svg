  <text x="40" y="665" fill="#5b6b8c" font-size="11">Sentiment: Negative · Confidence: 58% · Source: sample-feed</text>

  <text x="600" y="712" fill="#3d4a63" font-size="10" text-anchor="middle">All figures shown are illustrative demo data — not real portfolio holdings</text>
