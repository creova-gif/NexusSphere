  <text x="40" y="568" fill="#8b9bc1" font-size="11" letter-spacing="1">NEWS &amp; SENTIMENT — AI SUMMARIZED (DEMO)</text>
  <text x="40" y="595" fill="#e2e8f0" font-size="12">"Sample headline about a demo sector rotation into value stocks"</text>
  <text x="40" y="615" fill="#5b6b8c" font-size="11">Sentiment: Neutral-Positive · Confidence: 71% · Source: sample-feed</text>
